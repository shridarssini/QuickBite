<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBite - Create Account</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#FFF8F0;
min-height:100vh;
display:flex;
flex-direction:column;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 7%;
background:#FFF8F0;
box-shadow:0 3px 12px rgba(0,0,0,0.04);
}

.logo{
font-size:2rem;
font-weight:800;
color:#C62828;
text-decoration:none;
display:flex;
align-items:center;
gap:10px;
}

.back-btn{
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
color:#1F1F1F;
font-weight:500;
transition:0.3s;
}

.back-btn:hover{
color:#C62828;
}

.auth-container{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.auth-card{
background:white;
border-radius:32px;
padding:48px 40px;
width:100%;
max-width:440px;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.auth-card h1{
font-size:2rem;
font-weight:700;
color:#1F1F1F;
margin-bottom:8px;
}

.auth-card .subtitle{
color:#888;
font-size:0.95rem;
margin-bottom:32px;
}

.form-group{
margin-bottom:20px;
position:relative;
}

.form-group label{
display:block;
font-weight:500;
font-size:0.9rem;
color:#1F1F1F;
margin-bottom:8px;
}

.form-group input{
width:100%;
padding:16px 20px;
border:2px solid #eee;
border-radius:14px;
font-size:1rem;
font-family:'Poppins',sans-serif;
outline:none;
transition:0.3s;
background:#FAFAFA;
}

.form-group input:focus{
border-color:#C62828;
background:white;
box-shadow:0 0 0 4px rgba(198,40,40,0.06);
}

.form-group input.error{
border-color:#e53935;
background:#FFF5F5;
}

.form-group input.success{
border-color:#43A047;
}

.error-msg{
font-size:0.78rem;
color:#e53935;
margin-top:6px;
display:none;
align-items:center;
gap:5px;
}

.error-msg.show{
display:flex;
}

.terms{
display:flex;
align-items:flex-start;
gap:10px;
margin-bottom:28px;
font-size:0.85rem;
color:#666;
line-height:1.6;
}

.terms input{
accent-color:#C62828;
width:16px;
height:16px;
margin-top:3px;
flex-shrink:0;
}

.terms a{
color:#C62828;
text-decoration:none;
font-weight:500;
}

.terms-error{
font-size:0.78rem;
color:#e53935;
margin-top:-20px;
margin-bottom:20px;
display:none;
align-items:center;
gap:5px;
}

.terms-error.show{
display:flex;
}

.auth-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#C62828;
color:white;
font-size:1rem;
font-weight:600;
cursor:pointer;
transition:0.3s;
font-family:'Poppins',sans-serif;
}

.auth-btn:hover{
background:#a51f1f;
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(198,40,40,0.3);
}

.divider{
display:flex;
align-items:center;
gap:14px;
margin:28px 0;
}

.divider span{
font-size:0.85rem;
color:#aaa;
white-space:nowrap;
}

.divider::before,
.divider::after{
content:'';
flex:1;
height:1px;
background:#eee;
}

.social-btns{
display:flex;
gap:12px;
margin-bottom:28px;
}

.social-btn{
flex:1;
padding:14px;
border:2px solid #eee;
border-radius:14px;
background:white;
cursor:pointer;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-family:'Poppins',sans-serif;
font-weight:500;
font-size:0.9rem;
color:#1F1F1F;
}

.social-btn:hover{
border-color:#C62828;
background:rgba(198,40,40,0.02);
}

.social-btn i{
font-size:1.2rem;
}

.auth-footer{
text-align:center;
font-size:0.9rem;
color:#888;
}

.auth-footer a{
color:#C62828;
font-weight:600;
text-decoration:none;
}

.auth-footer a:hover{
opacity:0.7;
}

.password-wrapper{
position:relative;
}

.password-wrapper input{
padding-right:48px;
}

.toggle-password{
position:absolute;
right:16px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#aaa;
font-size:1rem;
transition:0.3s;
}

.toggle-password:hover{
color:#C62828;
}

.password-strength{
height:4px;
border-radius:4px;
margin-top:8px;
transition:0.3s;
background:#eee;
}

.password-strength .bar{
height:100%;
border-radius:4px;
transition:0.4s;
width:0;
}

.strength-text{
font-size:0.75rem;
margin-top:4px;
color:#888;
}

@media(max-width:520px){
.auth-card{
padding:36px 24px;
border-radius:24px;
}
.auth-card h1{
font-size:1.6rem;
}
.social-btns{
flex-direction:column;
}
}

/* Social Login Popup */
.social-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(4px);
z-index:5000;
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.social-overlay.active{
display:flex;
}

.social-popup{
background:white;
border-radius:24px;
padding:36px 32px;
width:100%;
max-width:380px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
animation:fadeUp 0.35s ease;
text-align:center;
}

.social-popup .popup-icon{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 18px;
font-size:1.6rem;
}

.social-popup .popup-icon.google{
background:rgba(219,68,55,0.08);
color:#DB4437;
}

.social-popup .popup-icon.facebook{
background:rgba(24,119,242,0.08);
color:#1877F2;
}

.social-popup h3{
font-size:1.2rem;
margin-bottom:6px;
color:#1F1F1F;
}

.social-popup .popup-sub{
font-size:0.85rem;
color:#888;
margin-bottom:24px;
}

.social-popup .popup-input{
width:100%;
padding:14px 18px;
border:2px solid #eee;
border-radius:12px;
font-size:0.95rem;
font-family:'Poppins',sans-serif;
outline:none;
transition:0.3s;
background:#FAFAFA;
margin-bottom:14px;
}

.social-popup .popup-input:focus{
border-color:#C62828;
background:white;
}

.social-popup .popup-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:0.95rem;
font-weight:600;
cursor:pointer;
transition:0.3s;
font-family:'Poppins',sans-serif;
color:white;
}

.social-popup .popup-btn.google{
background:#DB4437;
}

.social-popup .popup-btn.facebook{
background:#1877F2;
}

.social-popup .popup-btn:hover{
opacity:0.9;
transform:translateY(-2px);
}

.social-popup .popup-cancel{
margin-top:14px;
font-size:0.85rem;
color:#888;
cursor:pointer;
transition:0.3s;
border:none;
background:none;
font-family:'Poppins',sans-serif;
}

.social-popup .popup-cancel:hover{
color:#C62828;
}

.popup-error{
font-size:0.78rem;
color:#e53935;
margin-bottom:10px;
display:none;
}

.popup-error.show{
display:block;
}
</style>
</head>
<body>

<nav class="navbar">
<a href="Homepage.html" class="logo">
<img src="assets/logo.svg" alt="QuickBite" style="width:36px;height:36px;">
<span style="font-size:1.6rem;font-weight:800;color:#C62828;">QuickBite</span>
</a>
<a href="Homepage.html" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Back to Home
</a>
</nav>

<div class="auth-container">
<div class="auth-card">

<h1>Create Account</h1>
<p class="subtitle">Join QuickBite for delicious food experiences</p>

<form id="signUpForm" novalidate>

<div class="form-group">
<label>Full Name</label>
<input type="text" id="nameInput" placeholder="Enter your full name">
<div class="error-msg" id="nameError">
<i class="fa-solid fa-circle-exclamation"></i>
<span></span>
</div>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" id="emailInput" placeholder="Enter your email">
<div class="error-msg" id="emailError">
<i class="fa-solid fa-circle-exclamation"></i>
<span></span>
</div>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" id="phoneInput" placeholder="Enter your phone number">
<div class="error-msg" id="phoneError">
<i class="fa-solid fa-circle-exclamation"></i>
<span></span>
</div>
</div>

<div class="form-group">
<label>Password</label>
<div class="password-wrapper">
<input type="password" id="passwordInput" placeholder="Create a password">
<i class="fa-solid fa-eye toggle-password" id="togglePass1"></i>
</div>
<div class="password-strength"><div class="bar" id="strengthBar"></div></div>
<div class="strength-text" id="strengthText"></div>
<div class="error-msg" id="passwordError">
<i class="fa-solid fa-circle-exclamation"></i>
<span></span>
</div>
</div>

<div class="form-group">
<label>Confirm Password</label>
<div class="password-wrapper">
<input type="password" id="confirmInput" placeholder="Confirm your password">
<i class="fa-solid fa-eye toggle-password" id="togglePass2"></i>
</div>
<div class="error-msg" id="confirmError">
<i class="fa-solid fa-circle-exclamation"></i>
<span></span>
</div>
</div>

<label class="terms">
<input type="checkbox" id="termsCheck">
<span>I agree to QuickBite's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
</label>
<div class="terms-error" id="termsError">
<i class="fa-solid fa-circle-exclamation"></i>
<span>You must agree to the terms</span>
</div>

<button type="submit" class="auth-btn">Create Account</button>

</form>

<div class="divider"><span>or sign up with</span></div>

<div class="social-btns">
<button class="social-btn" id="googleBtn">
<i class="fa-brands fa-google" style="color:#DB4437"></i>
Google
</button>
<button class="social-btn" id="facebookBtn">
<i class="fa-brands fa-facebook-f" style="color:#1877F2"></i>
Facebook
</button>
</div>

<div class="auth-footer">
Already have an account? <a href="login.html">Login</a>
</div>

</div>
</div>

<!-- Social Login Popup -->
<div class="social-overlay" id="socialOverlay">
<div class="social-popup" id="socialPopup">
<div class="popup-icon" id="popupIcon">
<i id="popupIconI"></i>
</div>
<h3 id="popupTitle">Continue with Google</h3>
<p class="popup-sub" id="popupSub">Enter your details to continue</p>
<input type="text" class="popup-input" id="popupName" placeholder="Enter your name">
<input type="email" class="popup-input" id="popupEmail" placeholder="Enter your email">
<p class="popup-error" id="popupError">Please fill in all fields correctly</p>
<button class="popup-btn" id="popupBtn">Continue</button>
<button class="popup-cancel" id="popupCancel">Cancel</button>
</div>
</div>

<script>
const nameInput = document.getElementById('nameInput');
const emailInput = document.getElementById('emailInput');
const phoneInput = document.getElementById('phoneInput');
const passwordInput = document.getElementById('passwordInput');
const confirmInput = document.getElementById('confirmInput');
const termsCheck = document.getElementById('termsCheck');

const nameError = document.getElementById('nameError');
const emailError = document.getElementById('emailError');
const phoneError = document.getElementById('phoneError');
const passwordError = document.getElementById('passwordError');
const confirmError = document.getElementById('confirmError');
const termsError = document.getElementById('termsError');

const togglePass1 = document.getElementById('togglePass1');
const togglePass2 = document.getElementById('togglePass2');
const strengthBar = document.getElementById('strengthBar');
const strengthText = document.getElementById('strengthText');

const form = document.getElementById('signUpForm');

// Toggle password visibility
function togglePassword(btn, input){
btn.addEventListener('click', ()=>{
if(input.type === 'password'){
input.type = 'text';
btn.classList.remove('fa-eye');
btn.classList.add('fa-eye-slash');
} else {
input.type = 'password';
btn.classList.remove('fa-eye-slash');
btn.classList.add('fa-eye');
}
});
}
togglePassword(togglePass1, passwordInput);
togglePassword(togglePass2, confirmInput);

// Validation helpers
function showError(input, errorEl, message){
input.classList.add('error');
input.classList.remove('success');
errorEl.querySelector('span').textContent = message;
errorEl.classList.add('show');
}

function showSuccess(input, errorEl){
input.classList.remove('error');
input.classList.add('success');
errorEl.classList.remove('show');
}

function validateEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePhone(phone){
return /^[0-9]{10}$/.test(phone.replace(/[\s\-\+]/g,''));
}

// Password strength
function checkStrength(password){
let score = 0;
if(password.length >= 6) score++;
if(password.length >= 10) score++;
if(/[A-Z]/.test(password)) score++;
if(/[0-9]/.test(password)) score++;
if(/[^A-Za-z0-9]/.test(password)) score++;
return score;
}

// Real-time validation
nameInput.addEventListener('input', ()=>{
const val = nameInput.value.trim();
if(val === ''){
nameInput.classList.remove('error','success');
nameError.classList.remove('show');
} else if(val.length < 2){
showError(nameInput, nameError, 'Name must be at least 2 characters');
} else {
showSuccess(nameInput, nameError);
}
});

emailInput.addEventListener('input', ()=>{
const val = emailInput.value.trim();
if(val === ''){
emailInput.classList.remove('error','success');
emailError.classList.remove('show');
} else if(!validateEmail(val)){
showError(emailInput, emailError, 'Please enter a valid email address');
} else {
showSuccess(emailInput, emailError);
}
});

phoneInput.addEventListener('input', ()=>{
const val = phoneInput.value.trim();
if(val === ''){
phoneInput.classList.remove('error','success');
phoneError.classList.remove('show');
} else if(!validatePhone(val)){
showError(phoneInput, phoneError, 'Enter a valid 10-digit phone number');
} else {
showSuccess(phoneInput, phoneError);
}
});

passwordInput.addEventListener('input', ()=>{
const val = passwordInput.value;
if(val === ''){
passwordInput.classList.remove('error','success');
passwordError.classList.remove('show');
strengthBar.style.width = '0';
strengthText.textContent = '';
} else if(val.length < 6){
showError(passwordInput, passwordError, 'Password must be at least 6 characters');
strengthBar.style.width = '20%';
strengthBar.style.background = '#e53935';
strengthText.textContent = 'Too short';
strengthText.style.color = '#e53935';
} else {
showSuccess(passwordInput, passwordError);
const score = checkStrength(val);
if(score <= 2){
strengthBar.style.width = '40%';
strengthBar.style.background = '#FF9800';
strengthText.textContent = 'Weak';
strengthText.style.color = '#FF9800';
} else if(score <= 3){
strengthBar.style.width = '70%';
strengthBar.style.background = '#FFC107';
strengthText.textContent = 'Medium';
strengthText.style.color = '#FFC107';
} else {
strengthBar.style.width = '100%';
strengthBar.style.background = '#43A047';
strengthText.textContent = 'Strong';
strengthText.style.color = '#43A047';
}
}

// Re-validate confirm if filled
if(confirmInput.value !== ''){
if(confirmInput.value !== val){
showError(confirmInput, confirmError, 'Passwords do not match');
} else {
showSuccess(confirmInput, confirmError);
}
}
});

confirmInput.addEventListener('input', ()=>{
const val = confirmInput.value;
if(val === ''){
confirmInput.classList.remove('error','success');
confirmError.classList.remove('show');
} else if(val !== passwordInput.value){
showError(confirmInput, confirmError, 'Passwords do not match');
} else {
showSuccess(confirmInput, confirmError);
}
});

termsCheck.addEventListener('change', ()=>{
if(termsCheck.checked){
termsError.classList.remove('show');
}
});

// Form submit
form.addEventListener('submit', function(e){
e.preventDefault();

let valid = true;
const name = nameInput.value.trim();
const email = emailInput.value.trim();
const phone = phoneInput.value.trim();
const password = passwordInput.value;
const confirm = confirmInput.value;

if(name === ''){
showError(nameInput, nameError, 'Full name is required');
valid = false;
} else if(name.length < 2){
showError(nameInput, nameError, 'Name must be at least 2 characters');
valid = false;
}

if(email === ''){
showError(emailInput, emailError, 'Email is required');
valid = false;
} else if(!validateEmail(email)){
showError(emailInput, emailError, 'Please enter a valid email address');
valid = false;
}

if(phone === ''){
showError(phoneInput, phoneError, 'Phone number is required');
valid = false;
} else if(!validatePhone(phone)){
showError(phoneInput, phoneError, 'Enter a valid 10-digit phone number');
valid = false;
}

if(password === ''){
showError(passwordInput, passwordError, 'Password is required');
valid = false;
} else if(password.length < 6){
showError(passwordInput, passwordError, 'Password must be at least 6 characters');
valid = false;
}

if(confirm === ''){
showError(confirmInput, confirmError, 'Please confirm your password');
valid = false;
} else if(confirm !== password){
showError(confirmInput, confirmError, 'Passwords do not match');
valid = false;
}

if(!termsCheck.checked){
termsError.classList.add('show');
valid = false;
}

if(!valid) return;

// Save to localStorage with actual entered details
localStorage.setItem('quickbite_logged_in','true');
localStorage.setItem('quickbite_user', name);
localStorage.setItem('quickbite_email', email);

window.location.href = 'Homepage.html';
});

// Social Login
const googleBtn = document.getElementById('googleBtn');
const facebookBtn = document.getElementById('facebookBtn');
const socialOverlay = document.getElementById('socialOverlay');
const popupIcon = document.getElementById('popupIcon');
const popupIconI = document.getElementById('popupIconI');
const popupTitle = document.getElementById('popupTitle');
const popupSub = document.getElementById('popupSub');
const popupName = document.getElementById('popupName');
const popupEmail = document.getElementById('popupEmail');
const popupBtn = document.getElementById('popupBtn');
const popupCancel = document.getElementById('popupCancel');
const popupError = document.getElementById('popupError');

function openSocialPopup(provider){
socialOverlay.classList.add('active');
popupError.classList.remove('show');
popupName.value = '';
popupEmail.value = '';

if(provider === 'google'){
popupIcon.className = 'popup-icon google';
popupIconI.className = 'fa-brands fa-google';
popupTitle.textContent = 'Continue with Google';
popupSub.textContent = 'Enter your details to sign up with Google';
popupBtn.className = 'popup-btn google';
popupBtn.textContent = 'Sign up with Google';
} else {
popupIcon.className = 'popup-icon facebook';
popupIconI.className = 'fa-brands fa-facebook-f';
popupTitle.textContent = 'Continue with Facebook';
popupSub.textContent = 'Enter your details to sign up with Facebook';
popupBtn.className = 'popup-btn facebook';
popupBtn.textContent = 'Sign up with Facebook';
}
}

googleBtn.addEventListener('click', ()=> openSocialPopup('google'));
facebookBtn.addEventListener('click', ()=> openSocialPopup('facebook'));

popupCancel.addEventListener('click', ()=>{
socialOverlay.classList.remove('active');
});

socialOverlay.addEventListener('click', (e)=>{
if(e.target === socialOverlay){
socialOverlay.classList.remove('active');
}
});

popupBtn.addEventListener('click', ()=>{
const name = popupName.value.trim();
const email = popupEmail.value.trim();

if(name === '' || email === ''){
popupError.textContent = 'Please fill in all fields';
popupError.classList.add('show');
return;
}
if(!validateEmail(email)){
popupError.textContent = 'Please enter a valid email address';
popupError.classList.add('show');
return;
}

popupError.classList.remove('show');
localStorage.setItem('quickbite_logged_in','true');
localStorage.setItem('quickbite_user', name);
localStorage.setItem('quickbite_email', email);
window.location.href = 'Homepage.html';
});
</script>

</body>
</html>
