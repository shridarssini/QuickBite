<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBite - Sign In</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#FFF8F0;
min-height:100vh;
display:flex;
flex-direction:column;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 7%;
background:#FFF8F0;
box-shadow:0 3px 12px rgba(0,0,0,0.04);
}

.logo{
font-size:2rem;
font-weight:800;
color:#C62828;
text-decoration:none;
display:flex;
align-items:center;
gap:10px;
}

.back-btn{
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
color:#1F1F1F;
font-weight:500;
transition:0.3s;
}

.back-btn:hover{
color:#C62828;
}

.auth-container{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.auth-card{
background:white;
border-radius:32px;
padding:48px 40px;
width:100%;
max-width:440px;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.auth-card h1{
font-size:2rem;
font-weight:700;
color:#1F1F1F;
margin-bottom:8px;
}

.auth-card .subtitle{
color:#888;
font-size:0.95rem;
margin-bottom:32px;
}

.form-group{
margin-bottom:20px;
position:relative;
}

.form-group label{
display:block;
font-weight:500;
font-size:0.9rem;
color:#1F1F1F;
margin-bottom:8px;
}

.form-group input{
width:100%;
padding:16px 20px;
border:2px solid #eee;
border-radius:14px;
font-size:1rem;
font-family:'Poppins',sans-serif;
outline:none;
transition:0.3s;
background:#FAFAFA;
}

.form-group input:focus{
border-color:#C62828;
background:white;
box-shadow:0 0 0 4px rgba(198,40,40,0.06);
}

.form-group input.error{
border-color:#e53935;
background:#FFF5F5;
}

.form-group input.success{
border-color:#43A047;
}

.error-msg{
font-size:0.78rem;
color:#e53935;
margin-top:6px;
display:none;
align-items:center;
gap:5px;
}

.error-msg.show{
display:flex;
}

.form-options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:28px;
flex-wrap:wrap;
gap:10px;
}

.remember{
display:flex;
align-items:center;
gap:8px;
font-size:0.88rem;
color:#666;
cursor:pointer;
}

.remember input{
accent-color:#C62828;
width:16px;
height:16px;
}

.forgot{
font-size:0.88rem;
color:#C62828;
text-decoration:none;
font-weight:500;
}

.forgot:hover{
opacity:0.7;
}

.auth-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#C62828;
color:white;
font-size:1rem;
font-weight:600;
cursor:pointer;
transition:0.3s;
font-family:'Poppins',sans-serif;
}

.auth-btn:hover{
background:#a51f1f;
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(198,40,40,0.3);
}

.auth-btn:disabled{
background:#ccc;
cursor:not-allowed;
transform:none;
box-shadow:none;
}

.divider{
display:flex;
align-items:center;
gap:14px;
margin:28px 0;
}

.divider span{
font-size:0.85rem;
color:#aaa;
white-space:nowrap;
}

.divider::before,
.divider::after{
content:'';
flex:1;
height:1px;
background:#eee;
}

.social-btns{
display:flex;
gap:12px;
margin-bottom:28px;
}

.social-btn{
flex:1;
padding:14px;
border:2px solid #eee;
border-radius:14px;
background:white;
cursor:pointer;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-family:'Poppins',sans-serif;
font-weight:500;
font-size:0.9rem;
color:#1F1F1F;
}

.social-btn:hover{
border-color:#C62828;
background:rgba(198,40,40,0.02);
}

.social-btn i{
font-size:1.2rem;
}

.auth-footer{
text-align:center;
font-size:0.9rem;
color:#888;
}

.auth-footer a{
color:#C62828;
font-weight:600;
text-decoration:none;
}

.auth-footer a:hover{
opacity:0.7;
}

.password-wrapper{
position:relative;
}

.password-wrapper input{
padding-right:48px;
}

.toggle-password{
position:absolute;
right:16px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#aaa;
font-size:1rem;
transition:0.3s;
}

.toggle-password:hover{
color:#C62828;
}

@media(max-width:520px){
.auth-card{
padding:36px 24px;
border-radius:24px;
}
.auth-card h1{
font-size:1.6rem;
}
.social-btns{
flex-direction:column;
}
}

/* Social Login Popup */
.social-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(4px);
z-index:5000;
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.social-overlay.active{
display:flex;
}

.social-popup{
background:white;
border-radius:24px;
padding:36px 32px;
width:100%;
max-width:380px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
animation:fadeUp 0.35s ease;
text-align:center;
}

.social-popup .popup-icon{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 18px;
font-size:1.6rem;
}

.social-popup .popup-icon.google{
background:rgba(219,68,55,0.08);
color:#DB4437;
}

.social-popup .popup-icon.facebook{
background:rgba(24,119,242,0.08);
color:#1877F2;
}

.social-popup h3{
font-size:1.2rem;
margin-bottom:6px;
color:#1F1F1F;
}

.social-popup .popup-sub{
font-size:0.85rem;
color:#888;
margin-bottom:24px;
}

.social-popup .popup-input{
width:100%;
padding:14px 18px;
border:2px solid #eee;
border-radius:12px;
font-size:0.95rem;
font-family:'Poppins',sans-serif;
outline:none;
transition:0.3s;
background:#FAFAFA;
margin-bottom:14px;
}

.social-popup .popup-input:focus{
border-color:#C62828;
background:white;
}

.social-popup .popup-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:0.95rem;
font-weight:600;
cursor:pointer;
transition:0.3s;
font-family:'Poppins',sans-serif;
color:white;
}

.social-popup .popup-btn.google{
background:#DB4437;
}

.social-popup .popup-btn.facebook{
background:#1877F2;
}

.social-popup .popup-btn:hover{
opacity:0.9;
transform:translateY(-2px);
}

.social-popup .popup-cancel{
margin-top:14px;
font-size:0.85rem;
color:#888;
cursor:pointer;
transition:0.3s;
border:none;
background:none;
font-family:'Poppins',sans-serif;
}

.social-popup .popup-cancel:hover{
color:#C62828;
}

.popup-error{
font-size:0.78rem;
color:#e53935;
margin-bottom:10px;
display:none;
}

.popup-error.show{
display:block;
}
</style>
</head>
<body>

<nav class="navbar">
<a href="Homepage.html" class="logo">
<img src="assets/logo.svg" alt="QuickBite" style="width:36px;height:36px;">
<span style="font-size:1.6rem;font-weight:800;color:#C62828;">QuickBite</span>
</a>
<a href="Homepage.html" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Back to Home
</a>
</nav>

<div class="auth-container">
<div class="auth-card">

<h1>Welcome Back</h1>
<p class="subtitle">Login to your QuickBite account</p>

<form id="signInForm" novalidate>

<div class="form-group">
<label>Email Address</label>
<input type="email" id="emailInput" placeholder="Enter your email">
<div class="error-msg" id="emailError">
<i class="fa-solid fa-circle-exclamation"></i>
<span></span>
</div>
</div>

<div class="form-group">
<label>Password</label>
<div class="password-wrapper">
<input type="password" id="passwordInput" placeholder="Enter your password">
<i class="fa-solid fa-eye toggle-password" id="togglePass"></i>
</div>
<div class="error-msg" id="passwordError">
<i class="fa-solid fa-circle-exclamation"></i>
<span></span>
</div>
</div>

<div class="form-options">
<label class="remember">
<input type="checkbox"> Remember me
</label>
</div>

<button type="submit" class="auth-btn">Login</button>

</form>

<div class="divider"><span>or continue with</span></div>

<div class="social-btns">
<button class="social-btn" id="googleBtn">
<i class="fa-brands fa-google" style="color:#DB4437"></i>
Google
</button>
<button class="social-btn" id="facebookBtn">
<i class="fa-brands fa-facebook-f" style="color:#1877F2"></i>
Facebook
</button>
</div>

<div class="auth-footer">
Don't have an account? <a href="signup.html">Create Account</a>
</div>

</div>
</div>

<!-- Social Login Popup -->
<div class="social-overlay" id="socialOverlay">
<div class="social-popup" id="socialPopup">
<div class="popup-icon" id="popupIcon">
<i id="popupIconI"></i>
</div>
<h3 id="popupTitle">Continue with Google</h3>
<p class="popup-sub" id="popupSub">Enter your name to continue</p>
<input type="text" class="popup-input" id="popupName" placeholder="Enter your name">
<input type="email" class="popup-input" id="popupEmail" placeholder="Enter your email">
<p class="popup-error" id="popupError">Please fill in all fields correctly</p>
<button class="popup-btn" id="popupBtn">Continue</button>
<button class="popup-cancel" id="popupCancel">Cancel</button>
</div>
</div>

<script>
const emailInput = document.getElementById('emailInput');
const passwordInput = document.getElementById('passwordInput');
const emailError = document.getElementById('emailError');
const passwordError = document.getElementById('passwordError');
const togglePass = document.getElementById('togglePass');
const form = document.getElementById('signInForm');

// Toggle password visibility
togglePass.addEventListener('click', ()=>{
if(passwordInput.type === 'password'){
passwordInput.type = 'text';
togglePass.classList.remove('fa-eye');
togglePass.classList.add('fa-eye-slash');
} else {
passwordInput.type = 'password';
togglePass.classList.remove('fa-eye-slash');
togglePass.classList.add('fa-eye');
}
});

// Validation helpers
function showError(input, errorEl, message){
input.classList.add('error');
input.classList.remove('success');
errorEl.querySelector('span').textContent = message;
errorEl.classList.add('show');
}

function showSuccess(input, errorEl){
input.classList.remove('error');
input.classList.add('success');
errorEl.classList.remove('show');
}

function validateEmail(email){
const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
return re.test(email);
}

// Real-time validation
emailInput.addEventListener('input', ()=>{
const val = emailInput.value.trim();
if(val === ''){
emailInput.classList.remove('error','success');
emailError.classList.remove('show');
} else if(!validateEmail(val)){
showError(emailInput, emailError, 'Please enter a valid email address');
} else {
showSuccess(emailInput, emailError);
}
});

passwordInput.addEventListener('input', ()=>{
const val = passwordInput.value;
if(val === ''){
passwordInput.classList.remove('error','success');
passwordError.classList.remove('show');
} else if(val.length < 6){
showError(passwordInput, passwordError, 'Password must be at least 6 characters');
} else {
showSuccess(passwordInput, passwordError);
}
});

// Form submit
form.addEventListener('submit', function(e){
e.preventDefault();

let valid = true;
const email = emailInput.value.trim();
const password = passwordInput.value;

// Validate email
if(email === ''){
showError(emailInput, emailError, 'Email is required');
valid = false;
} else if(!validateEmail(email)){
showError(emailInput, emailError, 'Please enter a valid email address');
valid = false;
}

// Validate password
if(password === ''){
showError(passwordInput, passwordError, 'Password is required');
valid = false;
} else if(password.length < 6){
showError(passwordInput, passwordError, 'Password must be at least 6 characters');
valid = false;
}

if(!valid) return;

// Extract name from email (before @) and capitalize
const namePart = email.split('@')[0];
const displayName = namePart.charAt(0).toUpperCase() + namePart.slice(1);

// Save to localStorage
localStorage.setItem('quickbite_logged_in','true');
localStorage.setItem('quickbite_user', displayName);
localStorage.setItem('quickbite_email', email);

window.location.href = 'Homepage.html';
});

// Social Login
const googleBtn = document.getElementById('googleBtn');
const facebookBtn = document.getElementById('facebookBtn');
const socialOverlay = document.getElementById('socialOverlay');
const popupIcon = document.getElementById('popupIcon');
const popupIconI = document.getElementById('popupIconI');
const popupTitle = document.getElementById('popupTitle');
const popupSub = document.getElementById('popupSub');
const popupName = document.getElementById('popupName');
const popupEmail = document.getElementById('popupEmail');
const popupBtn = document.getElementById('popupBtn');
const popupCancel = document.getElementById('popupCancel');
const popupError = document.getElementById('popupError');

let currentProvider = '';

function openSocialPopup(provider){
currentProvider = provider;
socialOverlay.classList.add('active');
popupError.classList.remove('show');
popupName.value = '';
popupEmail.value = '';

if(provider === 'google'){
popupIcon.className = 'popup-icon google';
popupIconI.className = 'fa-brands fa-google';
popupTitle.textContent = 'Continue with Google';
popupSub.textContent = 'Enter your details to sign in with Google';
popupBtn.className = 'popup-btn google';
popupBtn.textContent = 'Sign in with Google';
} else {
popupIcon.className = 'popup-icon facebook';
popupIconI.className = 'fa-brands fa-facebook-f';
popupTitle.textContent = 'Continue with Facebook';
popupSub.textContent = 'Enter your details to sign in with Facebook';
popupBtn.className = 'popup-btn facebook';
popupBtn.textContent = 'Sign in with Facebook';
}
}

googleBtn.addEventListener('click', ()=> openSocialPopup('google'));
facebookBtn.addEventListener('click', ()=> openSocialPopup('facebook'));

popupCancel.addEventListener('click', ()=>{
socialOverlay.classList.remove('active');
});

socialOverlay.addEventListener('click', (e)=>{
if(e.target === socialOverlay){
socialOverlay.classList.remove('active');
}
});

popupBtn.addEventListener('click', ()=>{
const name = popupName.value.trim();
const email = popupEmail.value.trim();

if(name === '' || email === ''){
popupError.textContent = 'Please fill in all fields';
popupError.classList.add('show');
return;
}
if(!validateEmail(email)){
popupError.textContent = 'Please enter a valid email address';
popupError.classList.add('show');
return;
}

popupError.classList.remove('show');
localStorage.setItem('quickbite_logged_in','true');
localStorage.setItem('quickbite_user', name);
localStorage.setItem('quickbite_email', email);
window.location.href = 'Homepage.html';
});
</script>

</body>
</html>
