<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBite - Under Maintenance</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#FFF8F0 0%,#ffe8e0 50%,#FFF8F0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;color:#1F1F1F;}
body::before{content:'';position:absolute;top:-20%;left:-10%;width:500px;height:500px;border-radius:50%;background:rgba(198,40,40,0.06);animation:float1 8s ease-in-out infinite;}
body::after{content:'';position:absolute;bottom:-15%;right:-8%;width:400px;height:400px;border-radius:50%;background:rgba(198,40,40,0.05);animation:float2 10s ease-in-out infinite;}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,30px)}}

.maintenance{text-align:center;max-width:600px;padding:40px;position:relative;z-index:2;}

/* Animated Icon */
.icon-wrapper{width:140px;height:140px;margin:0 auto 36px;position:relative;}
.icon-circle{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,#C62828,#e53935);display:flex;align-items:center;justify-content:center;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(198,40,40,0.2)}50%{transform:scale(1.05);box-shadow:0 0 0 20px rgba(198,40,40,0)}}
.icon-circle i{font-size:3.5rem;color:white;}
.gear-spin{position:absolute;top:-10px;right:-10px;font-size:1.8rem;color:#C62828;animation:spin 4s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Text */
.maintenance h1{font-size:2.4rem;font-weight:800;color:#1F1F1F;margin-bottom:14px;line-height:1.3;}
.maintenance h1 span{color:#C62828;}
.maintenance p{font-size:1rem;color:#666;line-height:1.8;margin-bottom:30px;max-width:450px;margin-left:auto;margin-right:auto;}

/* Progress Bar */
.progress-wrapper{max-width:350px;margin:0 auto 30px;}
.progress-label{display:flex;justify-content:space-between;font-size:0.78rem;color:#888;margin-bottom:8px;}
.progress-bar{height:8px;background:rgba(198,40,40,0.1);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;width:75%;background:linear-gradient(90deg,#C62828,#e53935);border-radius:10px;animation:loading 2s ease-in-out infinite;}
@keyframes loading{0%{opacity:0.7}50%{opacity:1}100%{opacity:0.7}}

/* Timer */
.timer{display:flex;gap:16px;justify-content:center;margin-bottom:36px;}
.timer-box{background:white;border-radius:16px;padding:16px 20px;min-width:70px;box-shadow:0 6px 20px rgba(198,40,40,0.08);border:2px solid rgba(198,40,40,0.08);}
.timer-box .num{font-size:1.8rem;font-weight:800;color:#C62828;display:block;}
.timer-box .label{font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:0.5px;}

/* Notify Form */
.notify-form{display:flex;gap:10px;max-width:400px;margin:0 auto 30px;}
.notify-form input{flex:1;padding:14px 18px;border:2px solid #eee;border-radius:12px;font-size:0.9rem;font-family:'Poppins',sans-serif;outline:none;transition:0.3s;background:white;}
.notify-form input:focus{border-color:#C62828;}
.notify-form button{padding:14px 24px;border:none;border-radius:12px;background:linear-gradient(135deg,#C62828,#e53935);color:white;font-weight:600;font-size:0.85rem;cursor:pointer;transition:0.3s;font-family:'Poppins',sans-serif;white-space:nowrap;box-shadow:0 4px 15px rgba(198,40,40,0.2);}
.notify-form button:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(198,40,40,0.3);}

/* Social */
.social-row{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
.social-btn{width:44px;height:44px;border-radius:12px;background:rgba(198,40,40,0.06);display:flex;align-items:center;justify-content:center;color:#C62828;font-size:1rem;transition:0.3s;cursor:pointer;}
.social-btn:hover{background:#C62828;color:white;transform:translateY(-3px);box-shadow:0 6px 15px rgba(198,40,40,0.25);}

/* Logo */
.logo-bottom{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:30px;opacity:0.6;}
.logo-bottom img{width:34px;height:34px;border-radius:50%;}
.logo-bottom span{font-size:1.2rem;font-weight:800;color:#C62828;}

/* Floating food emojis */
.float-emoji{position:absolute;font-size:2.5rem;opacity:0.15;animation:floatEmoji 6s ease-in-out infinite;}
.fe1{top:10%;left:8%;animation-delay:0s;}
.fe2{top:20%;right:12%;animation-delay:1.5s;}
.fe3{bottom:15%;left:12%;animation-delay:3s;}
.fe4{bottom:25%;right:8%;animation-delay:4.5s;}
.fe5{top:50%;left:4%;animation-delay:2s;}
@keyframes floatEmoji{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(10deg)}}

@media(max-width:520px){
.maintenance h1{font-size:1.7rem;}
.timer{gap:10px;}
.timer-box{padding:12px 14px;min-width:58px;}
.timer-box .num{font-size:1.4rem;}
.notify-form{flex-direction:column;}
.notify-form button{width:100%;}
}
</style>
</head>
<body>

<!-- Floating Emojis -->
<div class="float-emoji fe1">🍕</div>
<div class="float-emoji fe2">🍔</div>
<div class="float-emoji fe3">🍜</div>
<div class="float-emoji fe4">🧁</div>
<div class="float-emoji fe5">🥗</div>

<div class="maintenance">

<!-- Icon -->
<div class="icon-wrapper">
<div class="icon-circle"><i class="fa-solid fa-wrench"></i></div>
<i class="fa-solid fa-gear gear-spin"></i>
</div>

<!-- Text -->
<h1>We're Cooking Up<br>Something <span>Better</span></h1>
<p>Our site is currently undergoing scheduled maintenance. We'll be back shortly with a better experience for you.</p>

<!-- Progress -->
<div class="progress-wrapper">
<div class="progress-label"><span>Progress</span><span>75%</span></div>
<div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<!-- Timer -->
<div class="timer">
<div class="timer-box"><span class="num" id="hours">02</span><span class="label">Hours</span></div>
<div class="timer-box"><span class="num" id="mins">30</span><span class="label">Minutes</span></div>
<div class="timer-box"><span class="num" id="secs">00</span><span class="label">Seconds</span></div>
</div>

<!-- Notify -->
<div class="notify-form">
<input type="email" placeholder="Enter your email to get notified">
<button onclick="this.textContent='Notified ✓';this.style.background='#43A047';">Notify Me</button>
</div>

<!-- Social -->
<div class="social-row">
<div class="social-btn"><i class="fa-brands fa-instagram"></i></div>
<div class="social-btn"><i class="fa-brands fa-facebook-f"></i></div>
<div class="social-btn"><i class="fa-brands fa-x-twitter"></i></div>
</div>

<!-- Logo -->
<div class="logo-bottom">
<img src="assets/logo.svg" alt="QuickBite">
<span>QuickBite</span>
</div>

</div>

<script>
// Countdown timer (2 hours 30 minutes from now)
let totalSeconds = 2*3600 + 30*60;
function updateTimer(){
const h = Math.floor(totalSeconds/3600);
const m = Math.floor((totalSeconds%3600)/60);
const s = totalSeconds%60;
document.getElementById('hours').textContent = h.toString().padStart(2,'0');
document.getElementById('mins').textContent = m.toString().padStart(2,'0');
document.getElementById('secs').textContent = s.toString().padStart(2,'0');
if(totalSeconds>0) totalSeconds--;
}
setInterval(updateTimer, 1000);
updateTimer();
</script>
</body>
</html>
